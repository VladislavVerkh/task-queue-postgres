# Kubernetes API version for Deployment resource.
apiVersion: apps/v1
# Resource kind managing Prometheus pods.
kind: Deployment
metadata:
  # Deployment name.
  name: task-queue-prometheus
  # Namespace where deployment is created.
  namespace: task-queue
  labels:
    # Common app label for selector/service.
    app: task-queue-prometheus
spec:
  # Number of Prometheus replicas.
  replicas: 1
  selector:
    matchLabels:
      # Deployment controls pods with this label.
      app: task-queue-prometheus
  template:
    metadata:
      labels:
        # Pod label matched by service selector.
        app: task-queue-prometheus
    spec:
      containers:
        - # Container name inside pod.
          name: prometheus
          # Prometheus image version.
          image: prom/prometheus:v3.10.0
          # Reuse local image if already present.
          imagePullPolicy: IfNotPresent
          args:
            # Path to Prometheus configuration file.
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - # Named HTTP port for UI/API.
              name: http
              # Prometheus HTTP listen port.
              containerPort: 9090
          volumeMounts:
            - # Config volume mount.
              name: config
              # Path where Prometheus reads config file.
              mountPath: /etc/prometheus
              # Prevent runtime writes to mounted ConfigMap files.
              readOnly: true
          readinessProbe:
            httpGet:
              # Readiness endpoint.
              path: /-/ready
              # Named port used for probe.
              port: http
            # Delay before first readiness probe.
            initialDelaySeconds: 5
            # Probe interval.
            periodSeconds: 5
            # Per-probe timeout.
            timeoutSeconds: 3
            # Consecutive failures before marking unready.
            failureThreshold: 12
          livenessProbe:
            httpGet:
              # Liveness endpoint.
              path: /-/healthy
              # Named port used for probe.
              port: http
            # Delay before first liveness probe.
            initialDelaySeconds: 20
            # Probe interval.
            periodSeconds: 10
            # Per-probe timeout.
            timeoutSeconds: 3
            # Consecutive failures before restart.
            failureThreshold: 6
          resources:
            requests:
              # Guaranteed CPU reservation.
              cpu: 100m
              # Guaranteed memory reservation.
              memory: 256Mi
            limits:
              # Max CPU usage allowed.
              cpu: 500m
              # Max memory usage allowed.
              memory: 1Gi
      volumes:
        - # Volume with Prometheus config generated by kustomize.
          name: config
          configMap:
            # ConfigMap name mounted into container.
            name: task-queue-prometheus-config
