# Kubernetes API version for Deployment resource.
apiVersion: apps/v1
# Resource kind managing Loki pods.
kind: Deployment
metadata:
  # Deployment name.
  name: task-queue-loki
  # Namespace where deployment is created.
  namespace: task-queue
  labels:
    # Common app label for selector/service.
    app: task-queue-loki
spec:
  # Number of Loki replicas.
  replicas: 1
  selector:
    matchLabels:
      # Deployment controls pods with this label.
      app: task-queue-loki
  template:
    metadata:
      labels:
        # Pod label matched by service selector.
        app: task-queue-loki
    spec:
      containers:
        - # Container name inside pod.
          name: loki
          # Loki image version.
          image: grafana/loki:3.6.7
          # Reuse local image if already present.
          imagePullPolicy: IfNotPresent
          args:
            # Path to Loki config file.
            - -config.file=/etc/loki/config.yml
          ports:
            - # Named HTTP port for Loki API.
              name: http
              # Loki HTTP listen port.
              containerPort: 3100
          volumeMounts:
            - # Config volume mount.
              name: config
              # Path where Loki reads config file.
              mountPath: /etc/loki
              # Prevent writes to mounted ConfigMap files.
              readOnly: true
            - # Data volume for indexes/chunks/wal.
              name: data
              # Loki storage root path from config.
              mountPath: /loki
          readinessProbe:
            httpGet:
              # Loki readiness endpoint.
              path: /ready
              # Named port used for probe.
              port: http
            # Delay before first readiness probe.
            initialDelaySeconds: 5
            # Probe interval.
            periodSeconds: 5
            # Per-probe timeout.
            timeoutSeconds: 3
            # Consecutive failures before marking unready.
            failureThreshold: 12
          livenessProbe:
            httpGet:
              # Reuse /ready endpoint for liveness checks.
              path: /ready
              # Named port used for probe.
              port: http
            # Delay before first liveness probe.
            initialDelaySeconds: 20
            # Probe interval.
            periodSeconds: 10
            # Per-probe timeout.
            timeoutSeconds: 3
            # Consecutive failures before restart.
            failureThreshold: 6
          resources:
            requests:
              # Guaranteed CPU reservation.
              cpu: 100m
              # Guaranteed memory reservation.
              memory: 256Mi
            limits:
              # Max CPU usage allowed.
              cpu: 500m
              # Max memory usage allowed.
              memory: 1Gi
      volumes:
        - # Volume containing Loki config generated by kustomize.
          name: config
          configMap:
            # ConfigMap name mounted into container.
            name: task-queue-loki-config
        - # Ephemeral storage for local Loki data in kind.
          name: data
          emptyDir: {}
