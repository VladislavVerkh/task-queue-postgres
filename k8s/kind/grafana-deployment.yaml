# Kubernetes API version for Deployment resource.
apiVersion: apps/v1
# Resource kind managing Grafana pods.
kind: Deployment
metadata:
  # Deployment name.
  name: task-queue-grafana
  # Namespace where deployment is created.
  namespace: task-queue
  labels:
    # Common app label for selector/service.
    app: task-queue-grafana
spec:
  # Number of Grafana replicas.
  replicas: 1
  selector:
    matchLabels:
      # Deployment controls pods with this label.
      app: task-queue-grafana
  template:
    metadata:
      labels:
        # Pod label matched by service selector.
        app: task-queue-grafana
    spec:
      containers:
        - # Container name inside pod.
          name: grafana
          # Grafana image version.
          image: grafana/grafana:12.4.0
          # Reuse local image if already present.
          imagePullPolicy: IfNotPresent
          ports:
            - # Named HTTP port for UI/API.
              name: http
              # Grafana HTTP listen port.
              containerPort: 3000
          env:
            - # Allow access without login for local sandbox usage.
              name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - # Role granted to anonymous users.
              name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - # Hide login form when anonymous auth is enabled.
              name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          volumeMounts:
            - # Grafana datasource provisioning config.
              name: datasources
              # Provisioning folder watched by Grafana.
              mountPath: /etc/grafana/provisioning/datasources
              # Config files are read-only.
              readOnly: true
            - # Grafana dashboard provider config.
              name: dashboards-provider
              # Provisioning folder watched by Grafana.
              mountPath: /etc/grafana/provisioning/dashboards
              # Config files are read-only.
              readOnly: true
            - # Dashboard JSON definitions mounted as files.
              name: dashboards
              # Path referenced by dashboards provider config.
              mountPath: /var/lib/grafana/dashboards
              # Dashboard files are read-only.
              readOnly: true
          readinessProbe:
            httpGet:
              # Endpoint indicating Grafana readiness.
              path: /api/health
              # Named port used for probe.
              port: http
            # Delay before first readiness probe.
            initialDelaySeconds: 5
            # Probe interval.
            periodSeconds: 5
            # Per-probe timeout.
            timeoutSeconds: 3
            # Consecutive failures before marking unready.
            failureThreshold: 12
          livenessProbe:
            httpGet:
              # Endpoint indicating Grafana liveliness.
              path: /api/health
              # Named port used for probe.
              port: http
            # Delay before first liveness probe.
            initialDelaySeconds: 20
            # Probe interval.
            periodSeconds: 10
            # Per-probe timeout.
            timeoutSeconds: 3
            # Consecutive failures before restart.
            failureThreshold: 6
          resources:
            requests:
              # Guaranteed CPU reservation.
              cpu: 100m
              # Guaranteed memory reservation.
              memory: 128Mi
            limits:
              # Max CPU usage allowed.
              cpu: 500m
              # Max memory usage allowed.
              memory: 512Mi
      volumes:
        - # Datasource ConfigMap generated by kustomize.
          name: datasources
          configMap:
            # ConfigMap name mounted into container.
            name: task-queue-grafana-datasources
        - # Dashboard provider ConfigMap.
          name: dashboards-provider
          configMap:
            # ConfigMap name mounted into container.
            name: task-queue-grafana-dashboards-provider
        - # Dashboard JSON ConfigMap.
          name: dashboards
          configMap:
            # ConfigMap name mounted into container.
            name: task-queue-grafana-dashboards
