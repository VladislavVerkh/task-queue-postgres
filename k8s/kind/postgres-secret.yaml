# Kubernetes API version for Secret resource.
apiVersion: v1
# Resource kind storing sensitive values.
kind: Secret
metadata:
  # Secret name referenced by deployments.
  name: task-queue-db
  # Namespace where this Secret exists.
  namespace: task-queue
# Secret type for arbitrary key/value pairs.
type: Opaque
# Plain string inputs that Kubernetes stores as base64-encoded data.
stringData:
  # Default database name created by Postgres container.
  POSTGRES_DB: task_queue
  # DB username used by Postgres and clients.
  POSTGRES_USER: task_queue
  # DB password used by Postgres and clients.
  POSTGRES_PASSWORD: task_queue
