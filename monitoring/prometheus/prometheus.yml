global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: task-queue-sample
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - sample-app:8080

  - job_name: postgres
    static_configs:
      - targets:
          - postgres-exporter:9187
